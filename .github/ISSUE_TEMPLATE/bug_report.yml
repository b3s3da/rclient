name: Bug report
description: Something works incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: rclient version (server and/or agent)
      placeholder: e.g. v0.2.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: e.g. Debian 12, Alpine 3.20
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste server (`docker compose logs rclient`) or agent (`rclient-agent logs`) output. Redact tokens.
      render: shell
