name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: build agent binaries
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X rclient/internal/agent.Version=${version#v}"
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags="$ldflags" \
                -o "dist/rclient-agent-linux-$arch" ./cmd/agent
          done

      - name: checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/rclient-agent-linux-amd64
            dist/rclient-agent-linux-arm64
            dist/SHA256SUMS
